spring.application.name=Session03
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rikkei-postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rikkei}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rikkei}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
